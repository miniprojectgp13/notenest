name: notenest
description: Folder-first academic note organizer for students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.19.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
